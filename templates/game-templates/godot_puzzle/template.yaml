template: godot_puzzle
engine: godot
engine_version: "4.7.1"
language: gdscript
type: puzzle
entry_scene: res://scenes/main.tscn
main_scene: res://scenes/main.tscn
dependencies:
  - Node2D
  - Control
  - ColorRect
scripts:
  - scripts/board.gd
  - scripts/tile.gd
scenes:
  - scenes/main.tscn
  - scenes/tile.tscn
assets:
  - icon.svg
build:
  web: "Editor > Project > Export > Web"
  windows: "Editor > Project > Export > Windows Desktop"
validation:
  - headless_parse
