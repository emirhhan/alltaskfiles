template: godot_topdown_action
engine: godot
engine_version: "4.7.1"
language: gdscript
type: topdown_action
entry_scene: res://scenes/main.tscn
main_scene: res://scenes/main.tscn
dependencies:
  - CharacterBody2D
  - Area2D
  - CollisionShape2D
  - Timer
scripts:
  - scripts/player_topdown.gd
  - scripts/enemy.gd
scenes:
  - scenes/main.tscn
  - scenes/player.tscn
  - scenes/enemy.tscn
assets:
  - icon.svg
build:
  web: "Editor > Project > Export > Web"
  windows: "Editor > Project > Export > Windows Desktop"
validation:
  - headless_parse
